{% extends "base.html" %}
{% block title %}Enter new password{% endblock title %}
{% block content %}

<h1>{% trans "Set a new password" %}</h1>
<form method="POST">
    {% csrf_token %}
    {{ form }}
    <input class="btn btn-success" type="submit" value="{% blocktranslate %} Submit new password {% endblocktranslate %}">
</form>
{% endblock content %}
