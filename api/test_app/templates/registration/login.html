{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<h2>Log In</h2>
<form method="post">
  {% csrf_token %}
  {{ form }}
  <button type="submit">Log In</button>
</form>
<h4>Don't have an account?</h4>
<a href="{%url 'signup' %}">Sign up</a>
<p><a href="{% url 'password_reset' %}">Password Reset</a></p>
{% endblock %}
